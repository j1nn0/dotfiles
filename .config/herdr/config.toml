onboarding = false

[theme]
name = "catppuccin"
auto_switch = true
light_name = "catppuccin-latte"
dark_name = "catppuccin"

[ui.toast]
delivery = "system"

[keys]
split_vertical = "prefix+\\"
split_horizontal = "prefix+-"
focus_pane_left = "shift+left"
focus_pane_down = "shift+down"
focus_pane_up = "shift+up"
focus_pane_right = "shift+right"

[ui]
#sidebar_width = 0
#sidebar_min_width = 0
#sidebar_max_width = 0
agent_panel_scope = "all"
agent_panel_sort = "spaces"

[experimental]
pane_history = true

[[keys.command]] # open in a split beside your work
key = "prefix+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer --plugin herdr-file-viewer"

[[keys.command]] # …or in its own tab
key = "prefix+shift+f"
type = "shell"
command = "herdr plugin action invoke open-file-viewer-tab --plugin herdr-file-viewer"
